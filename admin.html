<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>จัดการฟอร์มลงทะเบียน</title>
  <link href="styles.css?v=20260615-5" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
  <style>
    body {
      background:
        linear-gradient(90deg, rgba(183, 132, 91, 0.08) 0 1px, transparent 1px 100%),
        radial-gradient(circle at 14% 10%, rgba(255, 163, 102, 0.24), transparent 28rem),
        linear-gradient(135deg, #fbf4ec 0%, #f7efe5 48%, #f5f5f2 100%);
      background-size: 42px 42px, auto, auto;
      min-height: 100%;
    }
    body.admin-page {
      color: #4f3a2e;
    }
    .admin-page .container {
      max-width: 1180px;
      width: min(calc(100% - 2rem), 1180px);
      margin: clamp(1rem, 3vw, 2.5rem) auto;
      padding: clamp(1rem, 2.4vw, 2rem);
      background: rgba(255, 250, 245, 0.9);
      border: 1px solid rgba(218, 190, 166, 0.72);
      box-shadow: 0 24px 80px rgba(87, 58, 34, 0.14);
    }
    .admin-hero {
      align-items: end;
      display: grid;
      gap: 1rem;
      grid-template-columns: minmax(0, 1fr) auto;
      margin-bottom: 1rem;
    }
    .admin-eyebrow {
      color: #9b623b;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0;
      margin: 0 0 0.2rem;
      text-transform: uppercase;
    }
    .admin-hero h1 {
      color: #3f2c23;
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      line-height: 1.12;
      margin: 0;
    }
    .admin-hero p {
      color: #7b6251;
      margin: 0.45rem 0 0;
      max-width: 58ch;
    }
    .admin-badge {
      align-items: center;
      background: #fff;
      border: 1px solid #ead5c6;
      border-radius: 999px;
      color: #6b4f3f;
      display: inline-flex;
      font-weight: 800;
      gap: 0.45rem;
      min-height: 2.7rem;
      padding: 0.55rem 0.9rem;
      white-space: nowrap;
    }
    .admin-badge::before {
      background: #1f9d68;
      border-radius: 999px;
      content: "";
      height: 0.55rem;
      width: 0.55rem;
    }
    .admin-panel {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(234, 219, 208, 0.9);
      border-radius: 8px;
      box-shadow: 0 16px 42px rgba(91, 61, 39, 0.1);
      margin-top: 1.25rem;
      padding: clamp(1rem, 2.5vw, 1.6rem);
    }
    .admin-section {
      border-top: 1px solid #eadbd0;
      margin-top: clamp(1.2rem, 2vw, 1.75rem);
      padding-top: clamp(1.2rem, 2vw, 1.75rem);
    }
    .admin-section:first-of-type {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem 1rem;
    }
    .settings-grid {
      align-items: end;
      grid-template-columns: minmax(240px, 1.2fr) repeat(2, minmax(180px, 1fr));
    }
    .question-card .field-grid {
      grid-template-columns: minmax(150px, 0.9fr) minmax(220px, 1.25fr) minmax(150px, 0.7fr) minmax(190px, 1fr);
    }
    .field-grid label,
    .question-card label {
      font-size: 0.92rem;
      margin-top: 0;
    }
    .field-grid input,
    .field-grid select,
    .question-options {
      min-height: 2.75rem;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .checkbox-container input {
      accent-color: #c25328;
      height: 1.05rem;
      margin: 0;
      width: 1.05rem;
    }
    .checkbox-container label {
      margin-top: 0;
    }
    .toggle-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1rem;
      margin-top: 1rem;
    }
    .toggle-grid .checkbox-container {
      background: #fffaf6;
      border: 1px solid #eadbd0;
      border-radius: 8px;
      margin-top: 0;
      min-height: 2.75rem;
      padding: 0.55rem 0.75rem;
    }
    .question-card {
      border: 1px solid #eadbd0;
      border-radius: 8px;
      padding: clamp(1rem, 2vw, 1.35rem);
      margin-top: 1rem;
      background: linear-gradient(180deg, #fffdfb 0%, #fff8f3 100%);
      box-shadow: 0 10px 28px rgba(81, 53, 34, 0.06);
    }
    .question-card-header {
      align-items: center;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .question-card h4 {
      margin: 0;
      color: var(--color-text);
      font-size: 1.05rem;
      line-height: 1.35;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .question-tools {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .question-tools button,
    .admin-actions button,
    .section-actions button {
      margin-top: 0;
      width: auto;
    }
    .question-options {
      min-height: 5rem;
      resize: vertical;
      width: 100%;
      padding: 0.65rem 0.75rem;
      font: inherit;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-top: var(--spacing-xs);
    }
    .admin-actions,
    .section-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .admin-actions {
      align-items: center;
      background: rgba(255, 250, 245, 0.94);
      backdrop-filter: blur(14px);
      border: 1px solid #eadbd0;
      border-radius: 8px;
      box-shadow: 0 12px 34px rgba(82, 52, 32, 0.1);
      bottom: max(0.75rem, env(safe-area-inset-bottom));
      justify-content: flex-end;
      padding: 0.75rem;
      position: sticky;
      z-index: 4;
    }
    .admin-actions button,
    .section-actions button,
    .question-tools button {
      min-height: 2.7rem;
      padding: 0.65rem 1rem;
    }
    .section-actions button {
      background: #3f6f67;
    }
    .section-actions button:hover:not(:disabled) {
      background: #315a54;
    }
    .danger {
      background-color: #b42318;
    }
    .danger:hover:not(:disabled) {
      background-color: #8f1d14;
    }
    .secondary {
      background-color: #7a6555;
    }
    .secondary:hover:not(:disabled) {
      background-color: #634f41;
    }
    .status {
      margin-top: 1rem;
      min-height: 1.5rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
    }
    .status.success {
      color: #1a8754;
    }
    .status.error {
      color: #b42318;
    }
    @media (max-width: 980px) {
      .admin-hero {
        align-items: start;
        grid-template-columns: 1fr;
      }
      .settings-grid,
      .question-card .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 640px) {
      .admin-page .container {
        width: min(calc(100% - 1rem), 1180px);
      }
      .admin-panel {
        padding-bottom: calc(8.75rem + env(safe-area-inset-bottom));
      }
      .field-grid {
        grid-template-columns: 1fr;
      }
      .settings-grid,
      .question-card .field-grid {
        grid-template-columns: 1fr;
      }
      .question-card-header {
        align-items: flex-start;
        flex-direction: column;
      }
      .question-tools,
      .question-tools button,
      .section-actions button {
        width: 100%;
      }
      .admin-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        left: max(0.75rem, env(safe-area-inset-left));
        margin: 0 auto;
        max-width: 420px;
        padding: 0.55rem;
        position: fixed;
        right: max(0.75rem, env(safe-area-inset-right));
      }
      .admin-actions button {
        font-size: 0.9rem;
        min-height: 2.6rem;
        padding: 0.55rem 0.65rem;
        width: 100%;
      }
      .admin-actions #saveConfigBtn {
        grid-column: 1 / -1;
      }
      .status {
        padding-bottom: calc(1.25rem + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body class="admin-page">
  <div class="container">
    <header class="admin-hero">
      <div>
        <p class="admin-eyebrow">Mellow.Sundae admin</p>
        <h1>จัดการฟอร์มลงทะเบียน</h1>
        <p>ปรับคำถาม ตัวเลือก และสถานะฟอร์มในหน้ากว้างที่อ่านง่ายขึ้นบน laptop โดยยังคงใช้งานบนมือถือได้สบาย</p>
      </div>
      <div class="admin-badge">Live form setup</div>
    </header>
    <div class="admin-panel">
      <div class="admin-section">
        <label for="adminToken">Admin token</label>
        <input type="password" id="adminToken" placeholder="Token from Apps Script properties">

        <div class="field-grid settings-grid">
          <div>
            <label for="eventName">ชื่อกิจกรรม</label>
            <input type="text" id="eventName" placeholder="เช่น Mellow.Sundae Weekly Run">
          </div>
          <div>
            <label for="mainTitle">หัวข้อฟอร์มหลัก</label>
            <input type="text" id="mainTitle" placeholder="Mellow.Sundae">
          </div>
          <div>
            <label for="mainSubtitle">คำอธิบายฟอร์มหลัก</label>
            <input type="text" id="mainSubtitle" placeholder="แบบฟอร์มลงทะเบียนเข้าร่วมงาน">
          </div>
          <div>
            <label for="questionnaireTitle">หัวข้อแบบสอบถามเพิ่มเติม</label>
            <input type="text" id="questionnaireTitle" placeholder="แบบสอบถามเพิ่มเติม">
          </div>
        </div>

        <div class="toggle-grid">
          <div class="checkbox-container">
            <input type="checkbox" id="allowFollowers" checked>
            <label for="allowFollowers">Allow followers</label>
          </div>

          <div class="checkbox-container">
            <input type="checkbox" id="isRegistrationOpen" checked>
            <label for="isRegistrationOpen">Open registration</label>
          </div>

          <div class="checkbox-container">
            <input type="checkbox" id="enableQuestionnaire" checked>
            <label for="enableQuestionnaire">Enable additional questionnaire</label>
          </div>
        </div>
      </div>

      <div class="admin-section">
        <h3>Main Questionnaire</h3>
        <div id="mainQuestions"></div>
        <div class="section-actions">
          <button type="button" id="addMainQuestionBtn">Add main question</button>
        </div>
      </div>

      <div class="admin-section">
        <h3>Additional Questionnaire</h3>
        <div id="additionalQuestions"></div>
        <div class="section-actions">
          <button type="button" id="addAdditionalQuestionBtn">Add additional question</button>
        </div>
      </div>

      <div class="admin-actions">
        <button id="reloadConfigBtn" type="button" class="secondary">โหลดข้อมูลล่าสุด</button>
        <button id="loadDefaultsBtn" type="button" class="secondary">Set to default from repo JSON</button>
        <button id="saveConfigBtn" type="button">บันทึกทั้งหมด</button>
      </div>

      <div id="statusMessage" class="status"></div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzPA4WZtRFhKVlsVK83kBb9MgqKpgKDhIUXIRnjJG0xlcHf1oskyc4wqIZu2GRbYB8/exec";
    const APP_VERSION = "20260615-5";
    const REMOTE_FORM_TIMEOUT_MS = 15000;
    const DEFAULT_CONFIG = {
      isRegistrationOpen: true,
      enableQuestionnaire: true,
      eventName: "Mellow.Sundae Weekly Activity",
      allowFollowers: true
    };
    const ANSWER_TYPES = ["text", "tel", "number", "email", "select", "radio", "checkbox"];
    const OPTION_TYPES = ["select", "radio", "checkbox"];

    const adminTokenInput = document.getElementById("adminToken");
    const eventNameInput = document.getElementById("eventName");
    const mainTitleInput = document.getElementById("mainTitle");
    const mainSubtitleInput = document.getElementById("mainSubtitle");
    const questionnaireTitleInput = document.getElementById("questionnaireTitle");
    const allowFollowersCheckbox = document.getElementById("allowFollowers");
    const isRegistrationOpenCheckbox = document.getElementById("isRegistrationOpen");
    const enableQuestionnaireCheckbox = document.getElementById("enableQuestionnaire");
    const mainQuestionsContainer = document.getElementById("mainQuestions");
    const additionalQuestionsContainer = document.getElementById("additionalQuestions");
    const addMainQuestionBtn = document.getElementById("addMainQuestionBtn");
    const addAdditionalQuestionBtn = document.getElementById("addAdditionalQuestionBtn");
    const reloadConfigBtn = document.getElementById("reloadConfigBtn");
    const loadDefaultsBtn = document.getElementById("loadDefaultsBtn");
    const saveConfigBtn = document.getElementById("saveConfigBtn");
    const statusMessage = document.getElementById("statusMessage");

    function setStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = `status ${type || ""}`;
    }

    async function loadLocalFormDefinition() {
      const cacheBust = `${APP_VERSION}-${Date.now()}`;
      const [configRes, mainRes, questionnaireRes] = await Promise.all([
        fetch(`config.json?v=${cacheBust}`, { cache: "no-store" }),
        fetch(`main.json?v=${cacheBust}`, { cache: "no-store" }),
        fetch(`questionnaire.json?v=${cacheBust}`, { cache: "no-store" })
      ]);

      return {
        config: await configRes.json(),
        main: await mainRes.json(),
        questionnaire: await questionnaireRes.json()
      };
    }

    function loadRemoteFormDefinition() {
      return callAppsScriptJsonp({
        action: "get_form_definition",
        t: Date.now().toString()
      });
    }

    function callAppsScriptJsonp(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `msAdminFormCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Timed out while loading form definition"));
        }, REMOTE_FORM_TIMEOUT_MS);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = function (definition) {
          cleanup();
          resolve(definition);
        };

        script.onerror = function () {
          cleanup();
          reject(new Error("Could not load form definition"));
        };

        const url = new URL(WEB_APP_URL);
        Object.keys(params).forEach((key) => {
          url.searchParams.set(key, params[key]);
        });
        url.searchParams.set("callback", callbackName);
        script.src = url.href;
        document.head.appendChild(script);
      });
    }

    async function saveToAppsScript(definition, adminToken) {
      const result = await callAppsScriptJsonp({
        action: "save_form_definition",
        adminToken,
        definition: JSON.stringify(definition),
        t: Date.now().toString()
      });

      if (!result || result.ok !== true) {
        throw new Error(result && result.error ? result.error : "Apps Script did not confirm the save");
      }

      return result.definition;
    }

    function mergeFormDefinition(localDefinition, remoteDefinition) {
      const localConfig = localDefinition.config || {};
      const remoteConfig = remoteDefinition.config || {};
      const remoteMain = remoteDefinition.main || {};
      const remoteQuestionnaire = remoteDefinition.questionnaire || {};

      return {
        config: { ...DEFAULT_CONFIG, ...localConfig, ...remoteConfig },
        main: {
          ...localDefinition.main,
          ...remoteMain,
          title: remoteMain.title || localDefinition.main.title,
          subtitle: remoteMain.subtitle || localDefinition.main.subtitle,
          questions: remoteMain.questions && remoteMain.questions.length
            ? remoteMain.questions
            : localDefinition.main.questions
        },
        questionnaire: {
          ...localDefinition.questionnaire,
          ...remoteQuestionnaire,
          title: remoteQuestionnaire.title || localDefinition.questionnaire.title,
          questions: remoteQuestionnaire.questions && remoteQuestionnaire.questions.length
            ? remoteQuestionnaire.questions
            : localDefinition.questionnaire.questions
        }
      };
    }

    function validateRemoteFormDefinition(definition) {
      if (!definition || typeof definition !== "object") {
        throw new Error("Remote form definition was empty");
      }
      if (!definition.config || !definition.main || !definition.questionnaire) {
        throw new Error("Remote form definition is incomplete");
      }
      if (!Array.isArray(definition.main.questions)) {
        throw new Error("Remote main questions are missing");
      }
      if (!Array.isArray(definition.questionnaire.questions)) {
        throw new Error("Remote questionnaire questions are missing");
      }

      return {
        config: { ...DEFAULT_CONFIG, ...definition.config },
        main: definition.main,
        questionnaire: definition.questionnaire
      };
    }

    async function loadFormDefinition() {
      return validateRemoteFormDefinition(await loadRemoteFormDefinition());
    }

    function renderDefinition(definition) {
      const config = definition.config || DEFAULT_CONFIG;

      eventNameInput.value = config.eventName || "";
      allowFollowersCheckbox.checked = config.allowFollowers !== false;
      isRegistrationOpenCheckbox.checked = config.isRegistrationOpen !== false;
      enableQuestionnaireCheckbox.checked = config.enableQuestionnaire !== false;
      mainTitleInput.value = definition.main.title || "";
      mainSubtitleInput.value = definition.main.subtitle || "";
      questionnaireTitleInput.value = definition.questionnaire.title || "";

      renderQuestions(mainQuestionsContainer, definition.main.questions || []);
      renderQuestions(additionalQuestionsContainer, definition.questionnaire.questions || []);
    }

    function renderQuestions(container, questions) {
      container.textContent = "";
      questions.forEach((question) => {
        container.appendChild(createQuestionCard(question));
      });
    }

    function normalizeLabelForRequired(label, isRequired) {
      const baseLabel = String(label || "").trim().replace(/\s*\*+\s*$/g, "");
      return isRequired && baseLabel ? `${baseLabel}*` : baseLabel;
    }

    function getQuestionTitle(label, name, isRequired) {
      return normalizeLabelForRequired(label, isRequired) || name || "New question";
    }

    function syncRequiredLabel(card, title, shouldMutateInput) {
      const labelInput = card.querySelector('[data-field="label"]');
      const nameInput = card.querySelector('[data-field="name"]');
      const requiredInput = card.querySelector('[data-field="required"]');
      const nextLabel = normalizeLabelForRequired(labelInput.value, requiredInput.checked);

      if (shouldMutateInput || requiredInput.checked) {
        labelInput.value = nextLabel;
      }

      title.textContent = nextLabel || nameInput.value || "New question";
    }

    function createQuestionCard(question) {
      const card = document.createElement("div");
      card.className = "question-card";
      const required = question.required === true;
      const labelValue = normalizeLabelForRequired(question.label || "", required);

      const header = document.createElement("div");
      header.className = "question-card-header";

      const title = document.createElement("h4");
      title.textContent = getQuestionTitle(labelValue, question.name, required);
      header.appendChild(title);

      const tools = document.createElement("div");
      tools.className = "question-tools";

      const removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "danger";
      removeBtn.textContent = "Remove";
      removeBtn.addEventListener("click", () => {
        card.remove();
        refreshQuestionNumbers();
      });
      tools.appendChild(removeBtn);

      header.appendChild(tools);
      card.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "field-grid";
      grid.appendChild(createTextField("Name", "name", question.name || ""));
      grid.appendChild(createTextField("Label", "label", labelValue));
      grid.appendChild(createTypeField(question.type || "text"));
      grid.appendChild(createTextField("Placeholder", "placeholder", question.placeholder || ""));
      card.appendChild(grid);

      const requiredWrap = createCheckboxField("Required", "required", required);
      const readonlyWrap = createCheckboxField("Readonly", "readonly", question.readonly === true);
      card.appendChild(requiredWrap);
      card.appendChild(readonlyWrap);

      const optionsWrap = document.createElement("div");
      optionsWrap.className = "options-wrap";
      const optionsLabel = document.createElement("label");
      optionsLabel.textContent = "Options";
      optionsWrap.appendChild(optionsLabel);

      const optionsTextarea = document.createElement("textarea");
      optionsTextarea.className = "question-options";
      optionsTextarea.dataset.field = "options";
      optionsTextarea.value = formatOptions(question.options || []);
      optionsWrap.appendChild(optionsTextarea);

      card.appendChild(optionsWrap);

      const typeSelect = card.querySelector('[data-field="type"]');
      typeSelect.addEventListener("change", () => {
        updateOptionsVisibility(card);
      });
      updateOptionsVisibility(card);

      card.querySelector('[data-field="required"]').addEventListener("change", () => {
        syncRequiredLabel(card, title, true);
      });
      card.querySelector('[data-field="label"]').addEventListener("input", (event) => {
        title.textContent = getQuestionTitle(
          event.target.value,
          card.querySelector('[data-field="name"]').value,
          card.querySelector('[data-field="required"]').checked
        );
      });
      card.querySelector('[data-field="label"]').addEventListener("blur", () => {
        syncRequiredLabel(card, title, true);
      });
      card.querySelector('[data-field="name"]').addEventListener("input", (event) => {
        if (!card.querySelector('[data-field="label"]').value) {
          title.textContent = event.target.value || "New question";
        }
      });

      return card;
    }

    function createTextField(labelText, fieldName, value) {
      const wrap = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = labelText;
      wrap.appendChild(label);

      const input = document.createElement("input");
      input.type = "text";
      input.dataset.field = fieldName;
      input.value = value;
      wrap.appendChild(input);

      return wrap;
    }

    function createTypeField(value) {
      const wrap = document.createElement("div");
      const label = document.createElement("label");
      label.textContent = "Answer type";
      wrap.appendChild(label);

      const select = document.createElement("select");
      select.dataset.field = "type";
      ANSWER_TYPES.forEach((type) => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        select.appendChild(option);
      });
      select.value = ANSWER_TYPES.includes(value) ? value : "text";
      wrap.appendChild(select);

      return wrap;
    }

    function createCheckboxField(labelText, fieldName, checked) {
      const wrap = document.createElement("div");
      wrap.className = "checkbox-container";

      const input = document.createElement("input");
      input.type = "checkbox";
      input.dataset.field = fieldName;
      input.checked = checked;
      wrap.appendChild(input);

      const label = document.createElement("label");
      label.textContent = labelText;
      wrap.appendChild(label);

      return wrap;
    }

    function updateOptionsVisibility(card) {
      const type = card.querySelector('[data-field="type"]').value;
      const optionsWrap = card.querySelector(".options-wrap");
      optionsWrap.style.display = OPTION_TYPES.includes(type) ? "block" : "none";
    }

    function formatOptions(options) {
      return options.map((option) => {
        if (typeof option === "string") return option;
        return `${option.value}|${option.label}`;
      }).join("\n");
    }

    function parseOptions(value) {
      return value
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          if (!line.includes("|")) return line;
          const [optionValue, ...labelParts] = line.split("|");
          return {
            value: optionValue.trim(),
            label: labelParts.join("|").trim()
          };
        });
    }

    function collectQuestions(container) {
      return Array.from(container.querySelectorAll(".question-card")).map((card) => {
        const isRequired = card.querySelector('[data-field="required"]').checked;
        const question = {
          name: card.querySelector('[data-field="name"]').value.trim(),
          label: normalizeLabelForRequired(card.querySelector('[data-field="label"]').value, isRequired),
          type: card.querySelector('[data-field="type"]').value
        };

        const placeholder = card.querySelector('[data-field="placeholder"]').value.trim();
        if (placeholder) question.placeholder = placeholder;
        if (isRequired) question.required = true;
        if (card.querySelector('[data-field="readonly"]').checked) question.readonly = true;

        if (OPTION_TYPES.includes(question.type)) {
          question.options = parseOptions(card.querySelector('[data-field="options"]').value);
        }

        return question;
      });
    }

    function validateQuestions(questions, sectionName) {
      const names = new Set();

      for (const question of questions) {
        if (!question.name || !question.label) {
          throw new Error(`${sectionName}: every question needs name and label`);
        }
        if (!/^[A-Za-z][0-9A-Za-z_]*$/.test(question.name)) {
          throw new Error(`${sectionName}: "${question.name}" must start with a letter and use only letters, numbers, and underscore`);
        }
        if (names.has(question.name)) {
          throw new Error(`${sectionName}: duplicate question name "${question.name}"`);
        }
        names.add(question.name);
        if (OPTION_TYPES.includes(question.type) && (!question.options || !question.options.length)) {
          throw new Error(`${sectionName}: "${question.name}" needs at least one option`);
        }
      }
    }

    function collectDefinition() {
      const mainQuestions = collectQuestions(mainQuestionsContainer);
      const additionalQuestions = collectQuestions(additionalQuestionsContainer);

      validateQuestions(mainQuestions, "Main questionnaire");
      validateQuestions(additionalQuestions, "Additional questionnaire");

      return {
        config: {
          isRegistrationOpen: isRegistrationOpenCheckbox.checked,
          enableQuestionnaire: enableQuestionnaireCheckbox.checked,
          eventName: eventNameInput.value.trim(),
          allowFollowers: allowFollowersCheckbox.checked
        },
        main: {
          title: mainTitleInput.value.trim(),
          subtitle: mainSubtitleInput.value.trim(),
          questions: mainQuestions
        },
        questionnaire: {
          title: questionnaireTitleInput.value.trim(),
          questions: additionalQuestions
        }
      };
    }

    function normalizeQuestion(question) {
      const normalized = {
        name: String(question.name || "").trim(),
        label: normalizeLabelForRequired(question.label, question.required === true),
        type: String(question.type || "text").trim(),
        required: question.required === true,
        readonly: question.readonly === true,
        placeholder: String(question.placeholder || "").trim(),
        options: "[]"
      };

      if (OPTION_TYPES.includes(normalized.type)) {
        normalized.options = JSON.stringify((question.options || []).map((option) => {
          if (typeof option === "string") return option.trim();

          return {
            value: String(option.value || "").trim(),
            label: String(option.label || "").trim()
          };
        }).filter((option) => {
          if (typeof option === "string") return option;
          return option.value && option.label;
        }));
      }

      return normalized;
    }

    function describeQuestionMismatch(sectionName, expectedQuestions, actualQuestions) {
      if (expectedQuestions.length !== actualQuestions.length) {
        return `${sectionName} questions did not update (${actualQuestions.length}/${expectedQuestions.length} saved)`;
      }

      for (let index = 0; index < expectedQuestions.length; index += 1) {
        const expected = expectedQuestions[index];
        const actual = actualQuestions[index];

        if (JSON.stringify(expected) !== JSON.stringify(actual)) {
          return `${sectionName} question ${index + 1} "${expected.name || actual.name || "unnamed"}" did not match after saving`;
        }
      }

      return "";
    }

    function getDefinitionMismatch(expected, actual) {
      if (!actual || !actual.main || !actual.questionnaire) {
        return "remote definition was empty";
      }

      const expectedConfig = {
        isRegistrationOpen: expected.config.isRegistrationOpen,
        enableQuestionnaire: expected.config.enableQuestionnaire,
        eventName: expected.config.eventName,
        allowFollowers: expected.config.allowFollowers,
        mainTitle: expected.main.title,
        mainSubtitle: expected.main.subtitle,
        questionnaireTitle: expected.questionnaire.title
      };
      const actualConfig = {
        isRegistrationOpen: actual.config.isRegistrationOpen,
        enableQuestionnaire: actual.config.enableQuestionnaire,
        eventName: actual.config.eventName,
        allowFollowers: actual.config.allowFollowers,
        mainTitle: actual.main.title,
        mainSubtitle: actual.main.subtitle,
        questionnaireTitle: actual.questionnaire.title
      };
      const expectedMain = expected.main.questions.map(normalizeQuestion);
      const actualMain = (actual.main.questions || []).map(normalizeQuestion);
      const expectedAdditional = expected.questionnaire.questions.map(normalizeQuestion);
      const actualAdditional = (actual.questionnaire.questions || []).map(normalizeQuestion);

      if (JSON.stringify(expectedConfig) !== JSON.stringify(actualConfig)) {
        return "event settings or titles did not update";
      }
      const mainMismatch = describeQuestionMismatch("main", expectedMain, actualMain);
      if (mainMismatch) return mainMismatch;

      const additionalMismatch = describeQuestionMismatch("additional", expectedAdditional, actualAdditional);
      if (additionalMismatch) return additionalMismatch;

      return "";
    }

    async function waitForSavedDefinition(expectedDefinition) {
      const deadline = Date.now() + 12000;
      let lastMismatch = "spreadsheet was not checked";

      while (Date.now() < deadline) {
        const savedDefinition = await loadRemoteFormDefinition();
        lastMismatch = getDefinitionMismatch(expectedDefinition, savedDefinition);

        if (!lastMismatch) {
          return savedDefinition;
        }

        await new Promise((resolve) => window.setTimeout(resolve, 1500));
      }

      throw new Error(`Spreadsheet did not match after saving: ${lastMismatch}. Check ADMIN_TOKEN and Apps Script deployment.`);
    }

    function refreshQuestionNumbers() {
      [mainQuestionsContainer, additionalQuestionsContainer].forEach((container) => {
        container.querySelectorAll(".question-card h4").forEach((heading, index) => {
          if (!heading.textContent || heading.textContent === "New question") {
            heading.textContent = `Question ${index + 1}`;
          }
        });
      });
    }

    async function refreshDefinition() {
      setStatus("กำลังโหลดข้อมูล...", "");
      const definition = await loadFormDefinition();
      renderDefinition(definition);
      setStatus("โหลดข้อมูลแล้ว", "success");
    }

    async function loadDefaults() {
      setStatus("กำลังโหลดค่า default จาก repo JSON...", "");
      const definition = await loadLocalFormDefinition();
      renderDefinition(definition);
      setStatus("โหลดค่า default แล้ว ยังไม่ได้บันทึกลง spreadsheet", "success");
    }

    async function saveDefinition() {
      const adminToken = adminTokenInput.value.trim();

      if (!adminToken) {
        setStatus("กรุณาใส่ admin token", "error");
        return;
      }

      let definition;
      try {
        definition = collectDefinition();
      } catch (err) {
        setStatus(err.message, "error");
        return;
      }

      if (!definition.config.eventName) {
        setStatus("กรุณาใส่ชื่อกิจกรรม", "error");
        return;
      }

      saveConfigBtn.disabled = true;
      setStatus("กำลังบันทึกข้อมูล...", "");

      try {
        const savedDefinition = await saveToAppsScript(definition, adminToken);
        renderDefinition(validateRemoteFormDefinition(savedDefinition));

        setStatus("บันทึกข้อมูลลง spreadsheet แล้ว", "success");
      } catch (err) {
        console.error(err);
        setStatus(`บันทึกไม่สำเร็จ: ${err.message}`, "error");
      } finally {
        saveConfigBtn.disabled = false;
      }
    }

    addMainQuestionBtn.addEventListener("click", () => {
      mainQuestionsContainer.appendChild(createQuestionCard({ type: "text" }));
      refreshQuestionNumbers();
    });
    addAdditionalQuestionBtn.addEventListener("click", () => {
      additionalQuestionsContainer.appendChild(createQuestionCard({ type: "text" }));
      refreshQuestionNumbers();
    });
    reloadConfigBtn.addEventListener("click", refreshDefinition);
    loadDefaultsBtn.addEventListener("click", loadDefaults);
    saveConfigBtn.addEventListener("click", saveDefinition);

    refreshDefinition().catch((err) => {
      console.error(err);
      setStatus(`โหลดฟอร์มล่าสุดไม่สำเร็จ: ${err.message}`, "error");
    });
  </script>
</body>
</html>
